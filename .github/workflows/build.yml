name: Build MuPDF Native Libraries
on:
  workflow_dispatch:
    inputs:
      platform:
        type: choice
        description: "Which platform to build?"
        required: true
        default: "all"
        options:
          - all
          - linux
          - macos-arm
          - windows

      mupdf_version:
        type: string
        description: "MuPDF version to build"
        required: true
        default: "1.25.0"

env:
  MUPDF_VERSION: ${{ github.event.inputs.mupdf_version }}
  MUPDF_BRANCH: ${{ github.event.inputs.mupdf_version }}

jobs:
  build-linux:
    name: Build MuPDF (Linux x86_64)
    if: github.event.inputs.platform == 'all' || github.event.inputs.platform == 'linux'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build MuPDF in manylinux2014
        run: |
          rm -rfd ./mupdf/
          docker run --rm \
            -v ${{ github.workspace }}:/work \
            -w /work \
            quay.io/pypa/manylinux_2_28_x86_64 \
            bash -c "
              set -e
              yum install -y git ccache harfbuzz-devel freetype-devel libjpeg-turbo-devel \
                openjpeg2-devel libpng-devel bzip2-devel zlib-devel

              rm -rfd ./mupdf/
            
              git clone --depth 1 --branch ${{ env.MUPDF_BRANCH }} --recurse-submodules https://github.com/ArtifexSoftware/mupdf.git

              cd mupdf
              CC='ccache gcc' make -j\$(nproc) shared=yes build=release libs
              
              mkdir -p /work/mupdf-artifacts
              cp build/shared-release/libmupdf.so* /work/mupdf-artifacts/ || true
            "

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mupdf-linux-x86_64
          path: mupdf-artifacts/*.so*
          if-no-files-found: error


  build-macos-arm:
    name: Build MuPDF (macOS Apple Silicon arm64)
    if: github.event.inputs.platform == 'all' || github.event.inputs.platform == 'macos-arm'
    runs-on: macos-latest
    env:
      MACOSX_DEPLOYMENT_TARGET: "11.0"
    steps:
      - uses: actions/checkout@v4

      - name: Cache Homebrew dependencies
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: brew-macos-arm-${{ runner.os }}
          restore-keys: brew-macos-arm-

      - name: Install dependencies
        run: |
          brew install cmake harfbuzz freetype libjpeg libpng bzip2 zlib curl openssl ccache

      - name: Clone MuPDF
        run: |
            rm -rfd mupdf/
            git clone --depth 1 --branch ${{ env.MUPDF_BRANCH }} --recurse-submodules https://github.com/ArtifexSoftware/mupdf.git

      - name: Build MuPDF
        run: |
          cd mupdf
          CC='ccache clang' make -j$(sysctl -n hw.ncpu) shared=yes build=release libs

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mupdf-macos-arm64
          path: mupdf/build/shared-release/*.dylib*
          if-no-files-found: error

  build-windows:
    name: Build MuPDF (Windows x86_64)
    if: github.event.inputs.platform == 'all' || github.event.inputs.platform == 'windows'
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            git
            make
            ccache
            python
            unzip
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-binutils
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-harfbuzz
            mingw-w64-ucrt-x86_64-freetype
            mingw-w64-ucrt-x86_64-libjpeg-turbo
            mingw-w64-ucrt-x86_64-openjpeg2
            mingw-w64-ucrt-x86_64-libpng
            mingw-w64-ucrt-x86_64-bzip2
            mingw-w64-ucrt-x86_64-zlib
            mingw-w64-ucrt-x86_64-curl
            mingw-w64-ucrt-x86_64-openssl

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-windows-${{ env.MUPDF_VERSION }}-${{ github.run_id }}
          restore-keys: |
            ccache-windows-${{ env.MUPDF_VERSION }}-

      - name: Cache MuPDF checkout
        uses: actions/cache@v4
        with:
          path: mupdf
          key: mupdf-src-${{ env.MUPDF_VERSION }}

      - name: Clone MuPDF
        run: |
          if [ -d mupdf/.git ]; then
            git -C mupdf reset --hard
            git -C mupdf clean -ffd
            git -C mupdf submodule update --init --recursive
          else
            rm -rf mupdf
            git clone --depth 1 --branch ${{ env.MUPDF_BRANCH }} --recurse-submodules https://github.com/ArtifexSoftware/mupdf.git
          fi

      - name: Build MuPDF
        env:
          CCACHE_DIR: ${{ github.workspace }}/.ccache
        run: |
          which python
          which unzip
          which pkg-config
          cd mupdf
          CC='ccache gcc' make -j$(nproc) shared=yes build=release XCFLAGS='-msse4.1' libs
          ccache -s

      - name: Collect artifacts
        run: |
          mkdir -p mupdf-artifacts
          if [ -f mupdf/build/shared-release/libmupdf.dll ]; then
            cp mupdf/build/shared-release/libmupdf.dll mupdf-artifacts/libmupdf.dll
          elif [ -f mupdf/build/shared-release/libmupdf.so.27.0 ]; then
            cp mupdf/build/shared-release/libmupdf.so.27.0 mupdf-artifacts/libmupdf.dll
          elif [ -f mupdf/build/shared-release/libmupdf.so ]; then
            cp mupdf/build/shared-release/libmupdf.so mupdf-artifacts/libmupdf.dll
          else
            find mupdf/build -type f -maxdepth 4 | sort
            exit 1
          fi
          {
            echo 'LIBRARY libmupdf.dll'
            echo 'EXPORTS'
            objdump -p mupdf-artifacts/libmupdf.dll \
              | awk '/^[[:space:]]*\[[[:space:]]*[0-9]+\][[:space:]]+\+base\[[[:space:]]*[0-9]+\][[:space:]]+[0-9a-fA-F]+[[:space:]]+[A-Za-z_][A-Za-z0-9_]*$/ { print "  " $NF }'
          } > mupdf-artifacts/libmupdf.def
          if [ "$(wc -l < mupdf-artifacts/libmupdf.def)" -lt 100 ]; then
            cat mupdf-artifacts/libmupdf.def
            exit 1
          fi
          dlltool \
            --dllname libmupdf.dll \
            --def mupdf-artifacts/libmupdf.def \
            --output-lib mupdf-artifacts/libmupdf.dll.a
          cp "$(dirname "$(gcc -print-libgcc-file-name)")/libgcc_s_seh-1.dll" \
            mupdf-artifacts/libgcc_s_seh-1.dll
          ls -lh mupdf-artifacts

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mupdf-windows-x86_64
          path: |
            mupdf-artifacts/libmupdf.dll
            mupdf-artifacts/libmupdf.dll.a
            mupdf-artifacts/libgcc_s_seh-1.dll
          if-no-files-found: error

  publish:
    name: Publish to GitHub Release
    needs: [build-linux, build-macos-arm, build-windows]
    runs-on: ubuntu-latest
    if: always() && (needs.build-linux.result == 'success' || needs.build-macos-arm.result == 'success' || needs.build-windows.result == 'success')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Organize artifacts
        run: |
          mkdir -p release
          cp artifacts/mupdf-linux-x86_64/* release/ 2>/dev/null || true
          cp artifacts/mupdf-macos-arm64/* release/ 2>/dev/null || true
          cp artifacts/mupdf-windows-x86_64/* release/ 2>/dev/null || true
          
          echo "Files to release:"
          ls -lh release/

      - name: Create/Update GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: mupdf-${{ env.MUPDF_VERSION }}
          files: release/*
          fail_on_unmatched_files: false
          generate_release_notes: true
          body: |
            Pre-built MuPDF ${{ env.MUPDF_VERSION }} native libraries
            
            **Included:**
            - Linux x86_64 (manylinux2014)
            - macOS arm64 (Apple Silicon)
            - Windows x86_64 (MinGW/UCRT)
            
            Download and use in your builds.
